<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="conteudo">
        <form onsubmit="return false;">
            <h1>Tarefa</h1>
            <div>
                <input type="text" placeholder="Digite uma tarefa" id="inputTarefa">
                <button id="btn" type="submit">Adicionar</button>
            </div>
        </form>

        <section class="listaTarefas">
            <p class="semTarefa">Nenhuma tarefa</p>
            <ul id="listaTarefas"></ul>
        </section>

    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
